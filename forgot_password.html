<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Client Follow-Up Tracker</title>

  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0f0f13;
      color: #f5f0e8;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      padding: 0 1rem;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background-color: #e8c547;
      border-radius: 10px;
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-area h1 {
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.3px;
      color: #f5f0e8;
      margin-bottom: 6px;
    }

    .logo-area p {
      font-size: 14px;
      color: #8a8a9a;
      font-family: sans-serif;
    }

    .card {
      background-color: #1a1a22;
      border: 0.5px solid #2e2e3a;
      border-radius: 12px;
      padding: 1.75rem;
    }

    /* Step indicator */
    .steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 1.75rem;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-family: sans-serif;
      color: #4a4a5a;
    }

    .step.active { color: #e8c547; }
    .step.done   { color: #639922; }

    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid #2e2e3a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .step.active .step-num {
      background-color: #e8c547;
      border-color: #e8c547;
      color: #0f0f13;
    }

    .step.done .step-num {
      background-color: #1a2a1a;
      border-color: #2e7a2e;
      color: #97c459;
    }

    .step-line {
      flex: 1;
      height: 1px;
      background-color: #2e2e3a;
      margin: 0 8px;
    }

    /* Form groups */
    .form-group { margin-bottom: 1.25rem; }

    .form-group label {
      display: block;
      font-size: 12px;
      color: #8a8a9a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      font-family: sans-serif;
    }

    .form-group input {
      width: 100%;
      background-color: #0f0f13;
      border: 0.5px solid #2e2e3a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #f5f0e8;
      font-size: 14px;
      font-family: sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: #e8c547; }

    /* Password toggle wrapper */
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap input { padding-right: 44px; }

    .eye-btn {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 42px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a8a9a;
      transition: color 0.2s;
    }

    .eye-btn:hover { color: #f5f0e8; }

    /* Token display box */
    .token-box {
      background-color: #0f0f13;
      border: 0.5px solid #e8c547;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: monospace;
      font-size: 13px;
      color: #e8c547;
      word-break: break-all;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .copy-btn {
      background: none;
      border: 0.5px solid #2e2e3a;
      border-radius: 6px;
      color: #8a8a9a;
      font-size: 12px;
      font-family: sans-serif;
      padding: 5px 12px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: 1.25rem;
    }

    .copy-btn:hover { color: #f5f0e8; border-color: #4a4a5a; }

    .form-hint {
      font-size: 12px;
      color: #4a4a5a;
      font-family: sans-serif;
      margin-top: 5px;
    }

    /* Strength bar */
    .strength-bar-wrap {
      margin-top: 8px;
      height: 4px;
      background-color: #2e2e3a;
      border-radius: 4px;
      overflow: hidden;
    }

    .strength-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s, background-color 0.3s;
    }

    /* Alerts */
    .alert {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 1.25rem;
      display: none;
      font-family: sans-serif;
    }

    .alert-error   { background:#2a1a1a; border:0.5px solid #7a2e2e; color:#f09595; }
    .alert-success { background:#1a2a1a; border:0.5px solid #2e7a2e; color:#97c459; }
    .alert-info    { background:#1a2030; border:0.5px solid #2e5a8a; color:#85b7eb; }

    /* Buttons */
    .btn-primary {
      width: 100%;
      background-color: #e8c547;
      color: #0f0f13;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      font-family: sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary:hover    { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .card-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 13px;
      color: #8a8a9a;
      font-family: sans-serif;
    }

    .card-footer a { color: #e8c547; text-decoration: none; }

    .page-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 12px;
      color: #4a4a5a;
      font-family: sans-serif;
    }

    /* Step panels */
    .step-panel { display: none; }
    .step-panel.active { display: block; }

  </style>
</head>

<body>

  <div class="wrapper">

    <div class="logo-area">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0f0f13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>Reset Your Password</h1>
      <p>Follow the two steps below</p>
    </div>

    <div class="card">

      <!-- Step indicator -->
      <div class="steps">
        <div class="step active" id="indicator-1">
          <div class="step-num">1</div>
          <span>Email</span>
        </div>
        <div class="step-line"></div>
        <div class="step" id="indicator-2">
          <div class="step-num">2</div>
          <span>New Password</span>
        </div>
      </div>


      <!-- ==============================
           STEP 1: Enter email
      ============================== -->
      <div class="step-panel active" id="panel-1">

        <div class="alert alert-error" id="step1-error"></div>

        <div class="form-group">
          <label for="reset-email">Your Email Address</label>
          <input type="email" id="reset-email" placeholder="you@company.com" />
        </div>

        <button class="btn-primary" id="step1-btn" onclick="handleForgotPassword()">
          Send Reset Token
        </button>

        <p class="card-footer">
          Remembered it? <a href="login.html">Back to login</a>
        </p>

      </div>


      <!-- ==============================
           STEP 2: Token + new password
      ============================== -->
      <div class="step-panel" id="panel-2">

        <div class="alert alert-error"   id="step2-error"></div>
        <div class="alert alert-success" id="step2-success"></div>

        <!--
          Token display box.
          In production this would come via email.
          For now we show it directly so the user can copy it.
        -->
        <div class="form-group">
          <label>Your Reset Token</label>
          <div class="token-box" id="token-display">—</div>
          <button class="copy-btn" onclick="copyToken()">Copy Token</button>
          <p class="form-hint">
            Copy this token and paste it below. In future versions this will be sent to your email automatically.
          </p>
        </div>

        <!--
          Token input — pre-filled automatically but user can edit.
          Useful if they copy-paste manually.
        -->
        <div class="form-group">
          <label for="reset-token">Reset Token</label>
          <input type="text" id="reset-token" placeholder="Paste your token here" />
        </div>

        <!-- New password with eye toggle + strength bar -->
        <div class="form-group">
          <label for="reset-pw">New Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="reset-pw"
              placeholder="Min. 8 characters"
              oninput="checkStrength(this.value)"
            />
            <button class="eye-btn" type="button" onclick="togglePw('reset-pw', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-bar-wrap">
            <div class="strength-bar-fill" id="strength-fill"></div>
          </div>
          <p class="form-hint" id="strength-label">Enter a new password</p>
        </div>

        <!-- Confirm new password with eye toggle -->
        <div class="form-group">
          <label for="reset-pw-confirm">Confirm New Password</label>
          <div class="input-wrap">
            <input type="password" id="reset-pw-confirm" placeholder="Repeat new password" />
            <button class="eye-btn" type="button" onclick="togglePw('reset-pw-confirm', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn-primary" id="step2-btn" onclick="handleResetPassword()">
          Set New Password
        </button>

        <p class="card-footer">
          <a href="login.html">← Back to login</a>
        </p>

      </div>

    </div>

    <p class="page-footer">Secured with JWT authentication</p>

  </div>


  <script>

    const API_BASE = 'https://client-followup-backend-production.up.railway.app';

    // ===== SWITCH TO STEP 2 =====
    function goToStep2(token) {
      // Update step indicators
      document.getElementById('indicator-1').classList.remove('active');
      document.getElementById('indicator-1').classList.add('done');
      document.getElementById('indicator-1').querySelector('.step-num').textContent = '✓';
      document.getElementById('indicator-2').classList.add('active');

      // Show token in display box and pre-fill input
      document.getElementById('token-display').textContent = token;
      document.getElementById('reset-token').value         = token;

      // Show step 2
      document.getElementById('panel-1').classList.remove('active');
      document.getElementById('panel-2').classList.add('active');
    }

    // ===== COPY TOKEN =====
    function copyToken() {
      const token = document.getElementById('token-display').textContent;
      navigator.clipboard.writeText(token).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy Token'; }, 2000);
      });
    }

    // ===== PASSWORD TOGGLE =====
    function togglePw(inputId, btn) {
      const input    = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type     = isHidden ? 'text' : 'password';
      btn.querySelector('svg').innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    }

    // ===== PASSWORD STRENGTH =====
    function checkStrength(password) {
      const fill  = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score   = 0;
      if (password.length >= 8)          score++;
      if (/[A-Z]/.test(password))        score++;
      if (/[0-9]/.test(password))        score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      const levels = [
        { width:'0%',   color:'#2e2e3a', text:'Enter a new password' },
        { width:'25%',  color:'#e24b4a', text:'Weak' },
        { width:'50%',  color:'#ef9f27', text:'Fair' },
        { width:'75%',  color:'#e8c547', text:'Good' },
        { width:'100%', color:'#639922', text:'Strong' },
      ];
      const level = password.length === 0 ? levels[0] : levels[score];
      fill.style.width           = level.width;
      fill.style.backgroundColor = level.color;
      label.textContent          = level.text;
    }

    // ===== STEP 1: REQUEST RESET TOKEN =====
    async function handleForgotPassword() {
      document.getElementById('step1-error').style.display = 'none';

      const email = document.getElementById('reset-email').value.trim();

      if (!email || !email.includes('@')) {
        const box = document.getElementById('step1-error');
        box.textContent = 'Please enter a valid email address.';
        box.style.display = 'block';
        return;
      }

      const btn = document.getElementById('step1-btn');
      btn.disabled    = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch(`${API_BASE}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();

        if (!res.ok) {
          const box = document.getElementById('step1-error');
          box.textContent   = data.detail || 'Could not send reset token. Check your email.';
          box.style.display = 'block';
          return;
        }

        // Backend returns { reset_token: "...", expires_in: "30 minutes" }
        goToStep2(data.reset_token || data.data?.reset_token);

      } catch (e) {
        const box = document.getElementById('step1-error');
        box.textContent   = 'Cannot reach the server. Make sure the backend is running.';
        box.style.display = 'block';
        console.error(e);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Send Reset Token';
      }
    }

    // ===== STEP 2: RESET PASSWORD =====
    async function handleResetPassword() {
      document.getElementById('step2-error').style.display   = 'none';
      document.getElementById('step2-success').style.display = 'none';

      const token   = document.getElementById('reset-token').value.trim();
      const newPw   = document.getElementById('reset-pw').value;
      const confirm = document.getElementById('reset-pw-confirm').value;

      if (!token) {
        const box = document.getElementById('step2-error');
        box.textContent = 'Please paste your reset token.'; box.style.display = 'block'; return;
      }

      if (newPw.length < 8) {
        const box = document.getElementById('step2-error');
        box.textContent = 'Password must be at least 8 characters.'; box.style.display = 'block'; return;
      }

      if (newPw !== confirm) {
        const box = document.getElementById('step2-error');
        box.textContent = 'Passwords do not match.'; box.style.display = 'block'; return;
      }

      const btn = document.getElementById('step2-btn');
      btn.disabled    = true;
      btn.textContent = 'Resetting...';

      try {
        const res = await fetch(`${API_BASE}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: newPw }),
        });

        const data = await res.json();

        if (!res.ok) {
          const box = document.getElementById('step2-error');
          box.textContent   = data.detail || 'Reset failed. Your token may have expired.';
          box.style.display = 'block';
          return;
        }

        // Success — show message then redirect to login
        const box = document.getElementById('step2-success');
        box.textContent   = 'Password reset successfully. Redirecting to login...';
        box.style.display = 'block';

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);

      } catch (e) {
        const box = document.getElementById('step2-error');
        box.textContent   = 'Cannot reach the server.';
        box.style.display = 'block';
        console.error(e);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Set New Password';
      }
    }

    // ===== AUTO-REDIRECT IF ALREADY LOGGED IN =====
    if (localStorage.getItem('access_token')) {
      window.location.href = 'dashboard.html';
    }

  </script>

</body>
</html>
